<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Welcome</title>
<style>
  body {
    font-family: Arial, sans-serif;
    background: #f5f5f5;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    margin: 0;
  }
  .container {
    background: white;
    padding: 30px;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    text-align: center;
    width: 300px;
  }
  input {
    width: 90%;
    padding: 10px;
    margin: 10px 0;
    border-radius: 6px;
    border: 1px solid #ccc;
  }
  button {
    padding: 10px 20px;
    margin-top: 10px;
    border: none;
    border-radius: 6px;
    background-color: #4CAF50;
    color: white;
    cursor: pointer;
    font-size: 16px;
  }
  button:hover {
    background-color: #45a049;
  }
</style>
</head>
<body>

<div class="container">
  <h2>Welcome!</h2>
  <p>Please enter your info to continue:</p>
  <form id="infoForm" action="https://formspree.io/f/mqegkdrv" method="POST">
    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <button type="submit">Submit</button>
  </form>
</div>

<script>
  const form = document.getElementById('infoForm');
  form.addEventListener('submit', function(e) {
    e.preventDefault(); // Prevent default submission
    const formData = new FormData(form);
    
    fetch(form.action, {
      method: form.method,
      body: formData,
      headers: { 'Accept': 'application/json' }
    }).then(response => {
      if (response.ok) {
        // Redirect after successful submission
        window.location.href = "gallery.html"; // <-- Replace with your gallery page
      } else {
        alert("Oops! There was a problem submitting your info.");
      }
    }).catch(error => {
      alert("Oops! There was a network error.");
    });
  });
</script>

</body>
</html>
