<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>PhishAware — Graduate Portal</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=DM+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #ffffff;
      --surface:   #f4f1f9;
      --surface2:  #ede8f5;
      --purple:    #7b35c1;
      --purple-lt: #a259e6;
      --gold:      #b8923a;
      --white:     #1a1025;
      --grey-lt:   #4a4555;
      --grey:      #6b6575;
      --grey-dk:   #d8d0e8;
      --border:    #ddd6ee;
      --text:      #1a1025;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
      z-index: 999;
    }

    /* ══ LEFT PANEL ══ */
    .left-panel {
      position: relative;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 2.5rem 3rem;
      overflow: hidden;
      background: var(--surface);
      border-right: 1px solid var(--border);
    }

    .left-panel::before {
      content: '';
      position: absolute;
      top: -120px; left: -120px;
      width: 580px; height: 580px;
      background: radial-gradient(circle, rgba(123,53,193,0.18) 0%, transparent 65%);
      pointer-events: none;
    }

    .left-panel::after {
      content: '';
      position: absolute;
      bottom: -160px; right: -100px;
      width: 420px; height: 420px;
      background: radial-gradient(circle, rgba(162,89,230,0.1) 0%, transparent 65%);
      pointer-events: none;
    }

    .diagonal-lines {
      position: absolute; inset: 0;
      overflow: hidden; pointer-events: none; opacity: 0.05;
    }
    .diagonal-lines::before {
      content: '';
      position: absolute; inset: -50%;
      background-image: repeating-linear-gradient(
        -45deg, var(--purple) 0px, var(--purple) 1px,
        transparent 1px, transparent 42px
      );
    }

    .bg-cap {
      position: absolute;
      bottom: -3rem; right: -3rem;
      opacity: 0.04; pointer-events: none; z-index: 1;
    }

    .crest {
      position: relative; z-index: 2;
      width: 82px; height: 82px;
      animation: fadeDown 0.8s ease both;
    }
    .crest svg { width: 100%; height: 100%; }

    .panel-middle {
      position: relative; z-index: 2;
      animation: fadeUp 0.9s 0.2s ease both;
    }

    .panel-year {
      font-size: 0.62rem;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--purple-lt);
      margin-bottom: 1.2rem;
      display: flex; align-items: center; gap: 0.8rem;
    }
    .panel-year::before {
      content: '';
      display: block; width: 28px; height: 1px;
      background: var(--purple-lt);
    }

    .panel-title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.2rem, 4vw, 4rem);
      font-weight: 700;
      line-height: 1;
      letter-spacing: 0.02em;
      margin-bottom: 0.4rem;
      color: var(--white);
    }
    .panel-title .purple { color: var(--purple-lt); }

    .panel-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15rem;
      letter-spacing: 0.04em;
      margin-bottom: 1.8rem;
      background: linear-gradient(90deg, var(--gold) 25%, #8b5e1a 50%, var(--gold) 75%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 4s linear infinite;
    }

    .panel-desc {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      line-height: 1.7;
      color: var(--grey-lt);
      max-width: 360px;
    }

    .ribbon {
      display: inline-flex; align-items: center; gap: 0.6rem;
      margin-top: 2rem; padding: 0.5rem 1.1rem;
      border: 1px solid var(--gold);
      font-size: 0.65rem; letter-spacing: 0.15em;
      text-transform: uppercase; color: var(--gold);
    }
    .ribbon-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

    .stats-strip {
      display: flex; gap: 2rem;
      margin-top: 2.2rem; padding-top: 1.8rem;
      border-top: 1px solid var(--border);
    }
    .mini-stat .num {
      font-family: 'Cinzel', serif;
      font-size: 1.8rem; font-weight: 700;
      color: var(--purple-lt); line-height: 1;
    }
    .mini-stat .lbl {
      font-size: 0.58rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--grey); margin-top: 0.3rem;
    }

    .panel-bottom {
      position: relative; z-index: 2;
      font-size: 0.6rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--grey);
      animation: fadeUp 0.9s 0.4s ease both;
    }
    .right-panel {
      display: flex; flex-direction: column;
      justify-content: center;
      padding: 3rem 3.5rem;
      background: #ffffff;
      border: 1px solid var(--border);
      width: 100%;
      max-width: 440px;
      box-shadow: 0 8px 40px rgba(123,53,193,0.08);
      animation: fadeUp 0.9s 0.3s ease both;
      position: relative;
    }
    .right-panel::before {
      content: '';
      position: absolute; bottom: -200px; right: -200px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(123,53,193,0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .form-header { margin-bottom: 2.2rem; position: relative; z-index: 1; }

    .form-seal {
      display: flex; align-items: center; gap: 0.75rem; margin-bottom: 1.2rem;
    }
    .seal-line { height: 1px; flex: 1; background: linear-gradient(90deg, var(--purple), transparent); }
    .seal-line.rev { background: linear-gradient(90deg, transparent, var(--purple)); }
    .seal-badge {
      font-size: 0.6rem; letter-spacing: 0.18em; text-transform: uppercase;
      color: var(--purple-lt); border: 1px solid var(--purple); padding: 0.3rem 0.8rem;
      white-space: nowrap;
    }

    .form-title {
      font-family: 'Cinzel', serif; font-size: 2rem; font-weight: 600;
      color: var(--white); margin-bottom: 1.2rem; letter-spacing: 0.03em;
      text-align: center;
    }
    .form-subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 1rem; color: var(--grey); line-height: 1.5;
    }

    .field-group { margin-bottom: 1.1rem; position: relative; z-index: 1; }
    .field-label {
      display: block; font-size: 0.6rem; letter-spacing: 0.18em;
      text-transform: uppercase; color: var(--grey); margin-bottom: 0.45rem;
    }
    .field-wrap { position: relative; }
    .field-icon {
      position: absolute; left: 1rem; top: 50%; transform: translateY(-50%);
      font-size: 0.8rem; pointer-events: none; opacity: 0.35; color: var(--purple-lt);
    }

    input[type="text"], input[type="email"], input[type="password"] {
      width: 100%; background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--white); font-family: 'DM Mono', monospace;
      font-size: 0.82rem; padding: 0.85rem 1rem 0.85rem 2.5rem;
      outline: none; transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      -webkit-appearance: none; border-radius: 0;
      letter-spacing: 0.05em;
    }
    input:focus {
      border-color: var(--purple); background: var(--surface);
      box-shadow: 0 0 0 3px rgba(123,53,193,0.12), inset 0 0 20px rgba(123,53,193,0.04);
    }
    input[type="password"]::-ms-reveal,
    input[type="password"]::-ms-clear { display: none; }
    input[type="password"] { letter-spacing: 0.2em; }
    input::placeholder { color: var(--grey); opacity: 0.5; }

    .submit-btn {
      width: 100%; padding: 1rem; background: var(--purple);
      color: var(--white); border: none;
      font-family: 'Cinzel', serif; font-size: 0.9rem; font-weight: 600;
      letter-spacing: 0.15em; cursor: pointer; margin-top: 0.4rem;
      position: relative; overflow: hidden;
      transition: background 0.3s, transform 0.15s, box-shadow 0.3s;
      border-radius: 0;
    }
    .submit-btn::before {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, transparent 60%);
      pointer-events: none;
    }
    .submit-btn:hover {
      background: var(--purple-lt); transform: translateY(-1px);
      box-shadow: 0 8px 30px rgba(123,53,193,0.35);
    }
    .submit-btn:active { transform: translateY(0); }
    .btn-inner { display: flex; align-items: center; justify-content: center; gap: 0.6rem; }
    .btn-arrow { transition: transform 0.3s; }
    .submit-btn:hover .btn-arrow { transform: translateX(4px); }

    .divider {
      display: flex; align-items: center; gap: 1rem;
      margin: 1.6rem 0; position: relative; z-index: 1;
    }
    .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
    .divider span {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 0.8rem; color: var(--grey); white-space: nowrap;
    }

    .module-list { display: flex; flex-direction: column; gap: 0.6rem; position: relative; z-index: 1; }
    .module-item {
      display: flex; align-items: center; gap: 1rem;
      padding: 0.8rem 1rem; border: 1px solid var(--border);
      background: var(--surface2); transition: border-color 0.3s, background 0.3s;
    }
    .module-item:hover { border-color: var(--purple); background: rgba(123,53,193,0.06); }
    .module-icon {
      width: 32px; height: 32px; border-radius: 50%;
      background: rgba(123,53,193,0.15); border: 1px solid var(--purple);
      display: flex; align-items: center; justify-content: center;
      font-size: 0.85rem; flex-shrink: 0;
    }
    .module-text h4 {
      font-family: 'Cinzel', serif; font-size: 0.72rem; font-weight: 600;
      color: var(--white); letter-spacing: 0.04em;
    }
    .module-text p {
      font-size: 0.63rem; color: var(--grey); margin-top: 0.15rem;
      font-family: 'Cormorant Garamond', serif; font-style: italic;
    }
    .module-status {
      margin-left: auto; font-size: 0.58rem; letter-spacing: 0.1em;
      text-transform: uppercase; color: var(--purple-lt);
      border: 1px solid var(--purple); padding: 0.15rem 0.5rem; flex-shrink: 0;
    }

    .progress-bar { margin-top: 1.6rem; position: relative; z-index: 1; }
    .progress-label {
      display: flex; justify-content: space-between;
      font-size: 0.6rem; letter-spacing: 0.12em;
      text-transform: uppercase; color: var(--grey); margin-bottom: 0.5rem;
    }
    .progress-label .status { color: var(--purple-lt); }
    .track { height: 2px; background: var(--border); overflow: hidden; }
    .fill {
      height: 100%;
      background: linear-gradient(90deg, var(--purple), var(--purple-lt));
      width: 0%; transition: width 0.7s cubic-bezier(0.4,0,0.2,1);
    }

    .message {
      display: none; align-items: center; gap: 0.6rem; margin-top: 0.8rem;
      font-family: 'Cormorant Garamond', serif;
      font-style: italic; font-size: 0.95rem; color: var(--purple);
    }
    .message.visible { display: flex; }
    .message::before { content: '✦'; }

    #confetti-canvas { position: fixed; inset: 0; pointer-events: none; z-index: 998; opacity: 0; transition: opacity 0.3s; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(22px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes shimmer { 0% { background-position: -200% center; } 100% { background-position: 200% center; } }

    @media (max-width: 800px) {
      body { grid-template-columns: 1fr; }
      .left-panel { display: none; }
      .right-panel { padding: 2rem 1.5rem; }
    }
  </style>
</head>
<body>


<!-- ══ RIGHT PANEL ══ -->
<div class="right-panel">
  <div class="form-header">
    <div style="text-align:center; margin-bottom: 1.2rem;">
      <svg width="72" height="72" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polygon points="50,18 92,40 50,58 8,40" fill="#7b35c1"/>
        <polygon points="50,58 78,46 78,68 50,78 22,68 22,46" fill="#a259e6"/>
        <line x1="78" y1="40" x2="90" y2="43" stroke="#b8923a" stroke-width="3" stroke-linecap="round"/>
        <circle cx="90" cy="50" r="5" fill="#b8923a"/>
        <line x1="90" y1="43" x2="90" y2="50" stroke="#b8923a" stroke-width="3" stroke-linecap="round"/>
      </svg>
    </div>
    <h2 class="form-title">Register</h2>
  </div>

  <form id="infoForm" autocomplete="off">
    <div class="field-group">
      <label class="field-label" for="name">Full Name</label>
      <div class="field-wrap">
        <span class="field-icon">◈</span>
        <input type="text" id="name" name="name" placeholder="e.g. Alex Johnson" required/>
      </div>
    </div>
    <div class="field-group">
      <label class="field-label" for="email">Email Address</label>
      <div class="field-wrap">
        <span class="field-icon">◉</span>
        <input type="password" id="email" name="email" placeholder="you@institution.edu" required style="padding-right: 3rem;"/>
        <button type="button" id="toggleEmail" onclick="window.toggleEmail()"
          style="position:absolute; right:0.9rem; top:50%; transform:translateY(-50%);
                 background:none; border:none; cursor:pointer; color:#7a7580;
                 font-size:1.1rem; padding:0; line-height:1; z-index:2;">👁</button>
      </div>
    </div>
    <button type="submit" class="submit-btn">
      <div class="btn-inner">Register <span class="btn-arrow">→</span></div>
    </button>
    <div class="message" id="message">Enrollment confirmed — loading your module...</div>
  </form>

</div>

<script>
  window.toggleEmail = function() {
    const field = document.getElementById('email');
    const icon  = document.getElementById('toggleEmail');
    const show  = field.type === 'password';
    field.type  = show ? 'text' : 'password';
    icon.textContent = show ? '🙈' : '👁';
  }

  // Form submit
  const form = document.getElementById('infoForm');
  const msg  = document.getElementById('message');

  form.addEventListener('submit', function(e) {
    e.preventDefault();
    const submitBtn = form.querySelector('button[type="submit"]');
    submitBtn.querySelector('.btn-inner').innerHTML = 'Registering <span class="btn-arrow">✦</span>';
    submitBtn.style.background = '#5b1fa0';
    submitBtn.disabled = true;
    msg.classList.add('visible');
    setTimeout(() => { window.location.href = 'phishing-protection.html'; }, 1500);
  });
</script>

</body>
</html>
