<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>You Have Been Phished!</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=DM+Mono:wght@300;400;500&family=Cinzel:wght@400;600;700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #ffffff;
      --purple:    #7b35c1;
      --purple-lt: #a259e6;
      --gold:      #b8923a;
      --text:      #1a1025;
      --border:    #ddd6ee;
      --grey:      #6b6575;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card {
      text-align: center;
      animation: fadeUp 0.9s ease both;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 1.5rem;
    }

    .cap {
      animation: fadeDown 0.8s ease both;
    }

    .title {
      font-family: 'Cinzel', serif;
      font-size: clamp(2.5rem, 7vw, 5.5rem);
      font-weight: 700;
      line-height: 1.05;
      letter-spacing: 0.02em;
      color: var(--text);
    }

    .title .purple { color: var(--purple-lt); }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-style: italic;
      font-size: 1.15rem;
      color: var(--grey);
      letter-spacing: 0.03em;
    }

    .divider {
      width: 60px;
      height: 2px;
      background: linear-gradient(90deg, var(--purple), var(--purple-lt));
    }

    @keyframes fadeUp   { from { opacity: 0; transform: translateY(24px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeDown { from { opacity: 0; transform: translateY(-12px); } to { opacity: 1; transform: translateY(0); } }
  </style>
</head>
<body>

  <div class="card">
    <svg class="cap" width="90" height="90" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <polygon points="50,18 92,40 50,58 8,40" fill="#7b35c1"/>
      <polygon points="50,58 78,46 78,68 50,78 22,68 22,46" fill="#a259e6"/>
      <line x1="78" y1="40" x2="90" y2="43" stroke="#b8923a" stroke-width="3" stroke-linecap="round"/>
      <circle cx="90" cy="50" r="5" fill="#b8923a"/>
      <line x1="90" y1="43" x2="90" y2="50" stroke="#b8923a" stroke-width="3" stroke-linecap="round"/>
    </svg>

    <div class="divider"></div>

    <h1 class="title">
      You Have Been<br>
      <span class="purple">Phished!</span>
    </h1>

    <p class="subtitle">This was a security awareness training exercise.</p>
  </div>

<script>
  // Confetti on load
  const canvas = document.createElement('canvas');
  canvas.style.cssText = 'position:fixed;inset:0;pointer-events:none;z-index:9999;';
  document.body.appendChild(canvas);
  const ctx = canvas.getContext('2d');
  let particles = [];

  function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);

  const colors = ['#7b35c1','#a259e6','#b8923a','#ddd6ee','#c8b8e8','#ffffff','#5b1fa0','#e0d0f5'];

  for (let i = 0; i < 180; i++) {
    particles.push({
      x: Math.random() * window.innerWidth,
      y: -10 - Math.random() * 300,
      w: 6 + Math.random() * 8,
      h: 3 + Math.random() * 4,
      color: colors[Math.floor(Math.random() * colors.length)],
      vx: (Math.random() - 0.5) * 2.5,
      vy: 2.5 + Math.random() * 3.5,
      angle: Math.random() * 360,
      spin: (Math.random() - 0.5) * 6,
      life: 1
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    particles = particles.filter(p => p.life > 0);
    particles.forEach(p => {
      ctx.save();
      ctx.translate(p.x, p.y);
      ctx.rotate(p.angle * Math.PI / 180);
      ctx.fillStyle = p.color;
      ctx.globalAlpha = Math.min(1, p.life);
      ctx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
      ctx.restore();
      p.x += p.vx; p.y += p.vy; p.angle += p.spin; p.vy += 0.05;
      if (p.y > canvas.height * 0.6) p.life -= 0.018;
    });
    if (particles.length > 0) requestAnimationFrame(draw);
    else canvas.remove();
  }

  window.addEventListener('load', draw);
</script>

</body>
</html>
